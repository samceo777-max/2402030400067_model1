<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Rocket Animation</title>

<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
    }

    body{
        height:100vh;
        display:flex;
        justify-content:center;
        align-items:center;
        overflow:hidden;
        background: radial-gradient(circle at bottom, #0f2027, #203a43, #000);
    }

    .space{
        position:relative;
        width:100%;
        height:100vh;
    }

    .star{
        position:absolute;
        width:4px;
        height:4px;
        background:white;
        border-radius:50%;
    }


    .rocket{
        position:absolute;
        bottom:-200px;
        left:50%;
        transform:translateX(-50%);
        animation: launch 6s linear infinite;
    }

    @keyframes launch{
         0%{
            bottom:-200px;
            transform:translateX(-50%) rotate(0deg);
        }

        50%{
            transform:translateX(-50%) rotate(-2deg);
        }

        100%{
            bottom:120%;
            transform:translateX(-50%) rotate(2deg);
        }
    }

    
    .flame{
        animation: flame 0.2s infinite alternate;
        transform-origin:center;
    }

    @keyframes flame{
        from{
            transform:scaleY(1);
            opacity:1;
        }

        to{
            transform:scaleY(1.2);
            opacity:0.6;
        }
    }
</style>
</head>

<body>

<div class="space">

    
    <div class="star" style="top:10%; left:20%;"></div>
    <div class="star" style="top:30%; left:70%;"></div>
    <div class="star" style="top:50%; left:40%;"></div>
    <div class="star" style="top:80%; left:90%;"></div>
    <div class="star" style="top:60%; left:10%;"></div>
    <div class="star" style="top:20%; left:50%;"></div>

    <div class="rocket">

        <svg width="140" height="240" viewBox="0 0 140 240">

        
            <ellipse cx="70" cy="70" rx="35" ry="70" fill="#dfe6e9"/>

            
            <polygon points="70,0 45,40 95,40" fill="#ff4757"/>

        
            <circle cx="70" cy="70" r="15" fill="#3498db"/>
            <circle cx="70" cy="70" r="8" fill="#ecf0f1"/>


            <polygon points="35,120 10,160 35,160" fill="#ff6b81"/>
            <polygon points="105,120 130,160 105,160" fill="#ff6b81"/>

            <rect x="50" y="130" width="40" height="50" rx="10" fill="#636e72"/>

            <polygon class="flame"
                points="70,220 55,180 85,180"
                fill="orange"/>

            <polygon class="flame"
                points="70,210 60,180 80,180"
                fill="yellow"/>

        </svg>

        
    </div>

</div>

</body>
</html>
